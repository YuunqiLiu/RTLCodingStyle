# Workflow for deploying bilingual static docs to GitHub Pages
name: Deploy Docs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
  
      - name: Install Sphinx
        run: |
          pip install sphinx sphinx_rtd_theme
          
      - name: Build English Docs
        run: |
          sphinx-build source build/en
          
      - name: Build Chinese Docs
        run: |
          sphinx-build source_zh build/zh

      - name: Copy Landing Page
        run: |
          cp landing/index.html build/index.html
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
