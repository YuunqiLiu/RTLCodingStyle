name: CI & Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  # ── Build job: validate docs build on every push/PR ────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Sphinx
        run: pip install sphinx sphinx_rtd_theme

      - name: Build English Docs
        run: sphinx-build source build/en

      - name: Build Chinese Docs
        run: sphinx-build source_zh build/zh

      - name: Verify SKILL.md exists
        run: test -f skill/SKILL.md

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs-build
          path: build/

  # ── Release job: only on version tags ──────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Sphinx
        run: pip install sphinx sphinx_rtd_theme

      - name: Build English Docs
        run: sphinx-build source build/en

      - name: Build Chinese Docs
        run: sphinx-build source_zh build/zh

      - name: Copy Landing Page
        run: cp landing/index.html build/index.html

      - name: Package docs
        run: |
          cd build && tar czf ../rtl-coding-style-docs-${{ github.ref_name }}.tar.gz . && cd ..

      - name: Package skill
        run: |
          tar czf rtl-coding-style-skill-${{ github.ref_name }}.tar.gz -C skill .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            rtl-coding-style-docs-${{ github.ref_name }}.tar.gz
            rtl-coding-style-skill-${{ github.ref_name }}.tar.gz
            skill/SKILL.md
